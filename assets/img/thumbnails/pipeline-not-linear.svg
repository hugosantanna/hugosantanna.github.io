<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2e2a1a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- The "linear" path (crossed out) -->
  <g opacity="0.3">
    <line x1="150" y1="315" x2="1050" y2="315" stroke="#ffffff33" stroke-width="2" stroke-dasharray="8,6"/>
    <!-- X through it -->
    <line x1="500" y1="280" x2="700" y2="350" stroke="#b33d3d55" stroke-width="3"/>
    <line x1="500" y1="350" x2="700" y2="280" stroke="#b33d3d55" stroke-width="3"/>
  </g>
  <!-- Phase nodes -->
  <g font-family="ui-monospace, monospace" font-size="12">
    <!-- Discovery -->
    <circle cx="200" cy="200" r="35" fill="#4a9eff11" stroke="#4a9eff55" stroke-width="2"/>
    <text x="200" y="205" text-anchor="middle" fill="#4a9eff88">discover</text>
    <!-- Strategy -->
    <circle cx="420" cy="150" r="35" fill="#d9775711" stroke="#d9775755" stroke-width="2"/>
    <text x="420" y="155" text-anchor="middle" fill="#d9775788">strategy</text>
    <!-- Execute -->
    <circle cx="600" cy="280" r="35" fill="#4d7c5a11" stroke="#4d7c5a55" stroke-width="2"/>
    <text x="600" y="285" text-anchor="middle" fill="#4d7c5a88">execute</text>
    <!-- Write -->
    <circle cx="780" cy="180" r="35" fill="#b8860b11" stroke="#b8860b55" stroke-width="2"/>
    <text x="780" y="185" text-anchor="middle" fill="#b8860b88">write</text>
    <!-- Review -->
    <circle cx="950" cy="300" r="35" fill="#4a9eff11" stroke="#4a9eff55" stroke-width="2"/>
    <text x="950" y="305" text-anchor="middle" fill="#4a9eff88">review</text>
  </g>
  <!-- Non-linear connections -->
  <g fill="none" stroke-width="1.5">
    <!-- Forward -->
    <path d="M235,195 C300,170 360,155 385,152" stroke="#ffffff22"/>
    <path d="M455,160 C500,190 540,250 565,270" stroke="#ffffff22"/>
    <path d="M635,270 C680,240 720,200 745,185" stroke="#ffffff22"/>
    <path d="M815,190 C860,220 900,270 915,290" stroke="#ffffff22"/>
    <!-- Re-entry arrows (the point) -->
    <path d="M940,335 C900,420 650,440 610,315" stroke="#d9775744" stroke-width="2" stroke-dasharray="6,4"/>
    <path d="M590,245 C560,160 460,130 430,148" stroke="#b33d3d33" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>
  <!-- Labels for re-entry -->
  <text x="770" y="430" font-family="Georgia, serif" font-size="14" fill="#d9775766" font-style="italic">referee says: redo</text>
  <text x="460" y="120" font-family="Georgia, serif" font-size="13" fill="#b33d3d55" font-style="italic">rethink</text>
  <!-- Diminishing returns curve (bottom) -->
  <path d="M150,560 C300,540 450,500 600,490 C750,485 900,483 1050,482" fill="none" stroke="#ffffff15" stroke-width="1.5"/>
  <text x="1060" y="478" font-family="Georgia, serif" font-size="11" fill="#ffffff22">quality</text>
  <text x="150" y="578" font-family="Georgia, serif" font-size="11" fill="#ffffff22">effort</text>
</svg>
